name: Release Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, for example 1.2.3 or 1.2.3-beta.1
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: release-publish-${{ github.event_name }}-${{ github.event.release.id || inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Derive version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW_VERSION="${{ inputs.version }}"
          else
            RAW_VERSION="${{ github.event.release.tag_name }}"
          fi

          VERSION="${RAW_VERSION#v}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version '$RAW_VERSION'. Expected semver like v1.2.3 or 1.2.3." >&2
            exit 1
          fi

          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"
          npm version "$VERSION" --no-git-tag-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package
        run: bun run release:verify

      - name: OIDC preflight
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]]; then
            echo "ACTIONS_ID_TOKEN_REQUEST_URL is missing. OIDC is not available." >&2
            exit 1
          fi

          echo "OIDC is available for this workflow run."
          npm --version
          npm config get registry

      - name: Publish to npmjs
        run: npm publish --access public
        env:
          NPM_CONFIG_PROVENANCE: "false"
